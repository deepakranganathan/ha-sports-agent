name: Sports Team Agent
version: "1.1.0"
slug: sports_agent
description: >-
  Daily sports news briefings and match-day notifications for your teams,
  powered by Google Gemini and delivered through Home Assistant.
url: https://github.com/deepakranganathan/ha-sports-agent
arch:
  - aarch64
  - amd64
startup: services
boot: auto
init: false
homeassistant_api: true
options:
  gemini_api_key: ""
  timezone: America/Chicago
  ha_notify_service: notify.mobile_app_phone
  gemini_model: gemini-2.5-flash
schema:
  gemini_api_key: password
  timezone: str
  ha_notify_service: str
  gemini_model: str?
map:
  - type: homeassistant_config
    read_only: false
  - type: addon_config
    read_only: false
